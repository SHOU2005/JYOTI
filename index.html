<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jyoti - AI Interview Assistant</title>
    <meta name="description"
        content="Switch company ki AI Interview Assistant - Professional Hindi telephonic interviews">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" fill="url(#gradient1)" />
                        <path d="M20 10 L20 30 M12 20 L28 20" stroke="white" stroke-width="3" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="gradient1" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" style="stop-color:#6366f1" />
                                <stop offset="100%" style="stop-color:#8b5cf6" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Jyoti</h1>
                    <p>AI Interview Assistant</p>
                </div>
            </div>
            <div class="company-badge">Switch</div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number">100+</span>
                <span class="stat-label">Interviews Conducted</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-number">3+</span>
                <span class="stat-label">Universities</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-number">85%</span>
                <span class="stat-label">Placement Rate</span>
            </div>
        </div>

        <!-- Main Interview Section -->
        <main class="interview-section">
            <div class="status-card">
                <div class="status-indicator" id="statusIndicator">
                    <div class="pulse-ring"></div>
                    <div class="status-dot"></div>
                </div>
                <div class="status-text">
                    <h2 id="statusTitle">तैयार</h2>
                    <p id="statusSubtitle">इंटरव्यू शुरू करने के लिए बटन दबाएं</p>
                </div>
            </div>

            <!-- Conversation Display -->
            <div class="conversation-container" id="conversationContainer">
                <div class="conversation-scroll" id="conversationScroll">
                    <!-- Messages will be added here dynamically -->
                </div>
            </div>

            <!-- Control Buttons -->
            <div class="controls">
                <button class="btn btn-primary" id="startBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"
                            fill="currentColor" />
                    </svg>
                    AI इंटरव्यू शुरू करें
                </button>
                <button class="btn btn-secondary" id="listenBtn" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"
                            fill="currentColor" />
                        <path
                            d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
                            fill="currentColor" />
                    </svg>
                    बोलें
                </button>
                <button class="btn btn-danger" id="endBtn" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"
                            fill="currentColor" />
                    </svg>
                    समाप्त करें
                </button>
            </div>

            <!-- Candidate Information Summary -->
            <div class="info-summary" id="infoSummary" style="display: none;">
                <h3>उम्मीदवार की जानकारी</h3>
                <div class="info-grid" id="infoGrid">
                    <!-- Information will be populated here -->
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 Switch | <a href="https://switchlocally.com" target="_blank">switchlocally.com</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
